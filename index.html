<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Moved | Nandish MS</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
        }
        body{
            background:#0f172a;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            padding:30px;
        }
        .container{
            max-width:650px;
        }
        h1{
            font-size:2.5rem;
            margin-bottom:20px;
        }
        p{
            font-size:1.1rem;
            line-height:1.8;
            color:#d1d5db;
        }
        .btn{
            display:inline-block;
            margin-top:35px;
            padding:14px 28px;
            background:#facc15;
            color:#000;
            text-decoration:none;
            border-radius:8px;
            font-weight:600;
            transition:.3s;
        }
        .btn:hover{
            transform:translateY(-2px);
            background:#fde047;
        }
        .small{
            margin-top:18px;
            color:#94a3b8;
            font-size:.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Portfolio Has Moved 🚀</h1>
    <p>
        Thank you for visiting.
        <br><br>
        My portfolio has been migrated to a new hosting platform to provide
        improved performance, reliability, and future updates.
    </p>
    <a class="btn"
       href="https://nandish-ms-portfolio.vercel.app/">
        Visit My New Portfolio
    </a>
    <div class="small">
        You will be redirected automatically in
        <span id="countdown">5</span>
        seconds.
    </div>
</div>
<script>
    let seconds = 5;
    const countdown = document.getElementById("countdown");
    const timer = setInterval(() => {
        seconds--;
        if (seconds > 0) {
            countdown.textContent = seconds;
        } else {
            countdown.textContent = "0";
            clearInterval(timer);
            window.location.href = "https://nandish-ms-portfolio.vercel.app/";
        }
    }, 1000);
</script>
</body>
</html>
